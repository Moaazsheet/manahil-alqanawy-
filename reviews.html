<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>آراء العملاء</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #fff8e6, #ffe0a3);
}

/* الهيدر */
header {
  background: linear-gradient(135deg, #b7791f, #f6ad55);
  color: #fff;
  padding: 22px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.15);
  border-bottom: 4px solid #8b5e1a;
}

.container {
  max-width: 850px;
  margin: auto;
  padding: 20px;
}

/* الكروت */
.card {
  background: #fffdf7;
  padding: 20px;
  border-radius: 18px;
  margin-bottom: 15px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  border: 1px solid #f3d9a4;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #e6c98a;
  font-family: 'Cairo';
  background: #fffaf0;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: linear-gradient(135deg, #d69e2e, #b7791f);
  color: white;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}

.review {
  background: #fffaf0;
  padding: 15px;
  border-radius: 14px;
  margin-top: 10px;
  border-right: 6px solid #d69e2e;
}

.review strong {
  color: #8b5e1a;
}

/* زر اللايك */
.like-btn {
  margin-top: 10px;
  background: #fff3cd;
  color: #8b5e1a;
  border: 1px solid #f6ad55;
  padding: 6px 10px;
  border-radius: 10px;
  cursor: pointer;
  width: auto;
}

.like-btn:hover {
  background: #ffe08a;
}
</style>

</head>

<body>

<header>
🐝 آراء عملاء مناحل القناوي 🍯
</header>

<div class="container">

<div class="card">
  <h3>اكتب رأيك</h3>

  <input id="name" placeholder="اسمك">
  <textarea id="text" placeholder="رأيك"></textarea>
  <input id="rating" type="number" min="1" max="5" placeholder="التقييم من 1 إلى 5">

  <button onclick="addReview()">إرسال</button>
</div>

<div class="card">
  <h3>كل الآراء</h3>
  <div id="list"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, increment }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7HP5CQNYE6LWUzkePbfy79GsjaArJvuk",
  authDomain: "mnahel-store.firebaseapp.com",
  projectId: "mnahel-store",
  storageBucket: "mnahel-store.firebasestorage.app",
  messagingSenderId: "843203232002",
  appId: "1:843203232002:web:c8f4990b65767eb9a6821b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// إضافة رأي
window.addReview = async function () {
  const name = document.getElementById("name").value;
  const text = document.getElementById("text").value;
  const rating = document.getElementById("rating").value;

  if (!name || !text || !rating) {
    alert("املأ البيانات");
    return;
  }

  await addDoc(collection(db, "reviews"), {
    name,
    text,
    rating: Number(rating),
    likes: 0,
    pinned: false,
    time: new Date()
  });

  document.getElementById("name").value = "";
  document.getElementById("text").value = "";
  document.getElementById("rating").value = "";
};

// ❤️ منع اللايك مرتين
window.likeReview = async function(id) {

  let liked = JSON.parse(localStorage.getItem("likedReviews") || "[]");

  if (liked.includes(id)) {
    alert("انت عملت إعجاب لهذا التعليق قبل كده ❤️");
    return;
  }

  const ref = doc(db, "reviews", id);

  await updateDoc(ref, {
    likes: increment(1)
  });

  liked.push(id);
  localStorage.setItem("likedReviews", JSON.stringify(liked));
};

// عرض البيانات
onSnapshot(collection(db, "reviews"), (snapshot) => {
  const list = document.getElementById("list");

  let reviews = [];

  snapshot.forEach(d => {
    reviews.push({ id: d.id, ...d.data() });
  });

  reviews.sort((a,b)=>{
    if(a.pinned === b.pinned) return b.rating - a.rating;
    return b.pinned - a.pinned;
  });

  list.innerHTML = "";

  reviews.forEach(r => {
    list.innerHTML += `
      <div class="review">
        <strong>${r.name}</strong>
        <div>${"⭐".repeat(r.rating)}</div>
        <p>${r.text}</p>

        <button class="like-btn" onclick="likeReview('${r.id}')">
          ❤️ إعجاب (${r.likes || 0})
        </button>
      </div>
    `;
  });
});
</script>

</body>
</html>
